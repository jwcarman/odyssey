spring.threads.virtual.enabled=true
spring.data.redis.host=localhost
spring.data.redis.port=6379

# The example app uses per-call customizers (see TtlPolicies.java) to apply
# different TTL tiers per stream, so the default-ttl values below are only the
# fallback used when a publisher doesn't specify its own policy. We shorten them
# here mostly to demonstrate the property override surface -- see
# TaskController / NotifyController / BroadcastController for the per-call
# cfg -> cfg.ttl(...) pattern that drives the actual stream lifetimes.
odyssey.default-ttl.inactivity-ttl=10m
odyssey.default-ttl.entry-ttl=10m
odyssey.default-ttl.retention-ttl=1m
odyssey.sse.keep-alive=15s
odyssey.sse.timeout=0

# Encryption-at-rest for journal payloads. Uncomment shared-key to turn on AES-GCM
# encryption via substrate-crypto. The value is base64-encoded and must decode to
# either 16 bytes (AES-128) or 32 bytes (AES-256). Generate one with:
#
#   openssl rand -base64 32
#
# In production, source this from a secret manager (Vault, AWS Secrets Manager, etc.)
# via Spring's property layering -- don't commit the key to source control.
#
#substrate.crypto.shared-key=REPLACE_WITH_BASE64_ENCODED_32_BYTE_KEY
#substrate.crypto.shared-kid=example-v1
