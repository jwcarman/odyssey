spring:
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: localhost
      port: 6379

# The example app uses per-call customizers (see TtlPolicies.java) to apply
# different TTL tiers per stream, so the default-ttl values below are only the
# fallback used when a publisher doesn't specify its own policy. We shorten them
# here mostly to demonstrate the property override surface -- see
# TaskController / NotifyController / BroadcastController for the per-call
# cfg -> cfg.ttl(...) pattern that drives the actual stream lifetimes.
odyssey:
  default-ttl:
    inactivity-ttl: 10m
    entry-ttl: 10m
    retention-ttl: 1m
  sse:
    keep-alive: 15s
    timeout: 0
